name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch blessed for bundler
        run: node scripts/patch-blessed.js

      - name: Build — Linux x64
        run: bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/accounts-browser-linux-amd64

      - name: Build — Linux ARM64
        run: bun build src/index.ts --compile --target=bun-linux-arm64 --outfile dist/accounts-browser-linux-arm64

      - name: Build — Windows x64
        run: bun build src/index.ts --compile --target=bun-windows-x64 --outfile dist/accounts-browser-win32-amd64.exe

      - name: Build — Windows ARM64
        run: bun build src/index.ts --compile --target=bun-windows-arm64 --outfile dist/accounts-browser-win32-arm64.exe

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/accounts-browser-linux-amd64
            dist/accounts-browser-linux-arm64
            dist/accounts-browser-win32-amd64.exe
            dist/accounts-browser-win32-arm64.exe
